<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCMod 搜索结果</title>
    <style>
        :root {
            --primary: #43a047;
            --primary-dark: #2e7d32;
            --bg: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
            --card-bg: #ffffff;
            --text: #2e4a2f;
            --text-muted: #6b8f6e;
            --radius: 18px;
            --shadow: 0 12px 32px rgba(67, 160, 71, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; justify-content: center; padding: 12px; }

        .card {
            width: 96%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card::before {
            content: "";
            display: block;
            height: 6px;
            background: linear-gradient(90deg, #43a047, #81c784);
        }

        .header {
            padding: 20px 22px 12px;
            border-bottom: 1px solid #e8f5e9;
        }

        .badge {
            display: inline-block;
            background: rgba(67, 160, 71, 0.12);
            color: var(--primary-dark);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .title-line {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .keyword {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
        }

        .list { padding: 8px 12px 16px; }

        .item {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            background: rgba(67, 160, 71, 0.05);
        }

        .item-index {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .item-cover {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            overflow: hidden;
            background: #e8f5e9;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .item-cover img { width: 100%; height: 100%; object-fit: cover; }

        .item-body { flex: 1; min-width: 0; }

        .item-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
            word-break: break-word;
        }

        .item-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .item-id {
            font-size: 11px;
            color: var(--primary-dark);
            margin-top: 3px;
            font-weight: 600;
        }

        .footer {
            padding: 10px 22px 16px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer-hint {
            margin-bottom: 6px;
        }

        .footer-brand {
            text-align: right;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="badge" id="typeBadge">搜索结果</div>
        <div class="title-line" id="resultTitle">搜索结果</div>
        <div class="keyword" id="keywordLine"></div>
    </div>
    <div class="list" id="itemList"></div>
    <div class="footer">
        <div class="footer-hint">回复本消息并发送序号查看详情 · 也可使用 ID 直接查询</div>
        <div class="footer-brand">MCMod 百科 · BaniraKanri</div>
    </div>
</div>

<script src="config.js"></script>
<script>
    window.__mcModReady = false;

    function preloadImage(url) {
        return new Promise(resolve => {
            if (!url) return resolve(false);
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
        });
    }

    async function renderItem(item, index) {
        const row = document.createElement("div");
        row.className = "item";

        const idx = document.createElement("div");
        idx.className = "item-index";
        idx.textContent = String(index + 1);
        row.appendChild(idx);

        const coverWrap = document.createElement("div");
        coverWrap.className = "item-cover";
        if (item.cover && await preloadImage(item.cover)) {
            const img = document.createElement("img");
            img.src = item.cover;
            img.alt = item.title || "";
            coverWrap.appendChild(img);
        } else {
            coverWrap.textContent = item.shortName || item.abbrev || (item.title || "?").substring(0, 1).toUpperCase();
        }
        row.appendChild(coverWrap);

        const body = document.createElement("div");
        body.className = "item-body";
        const title = document.createElement("div");
        title.className = "item-title";
        title.textContent = item.title || "未命名";
        body.appendChild(title);
        if (item.subtitle) {
            const sub = document.createElement("div");
            sub.className = "item-sub";
            sub.textContent = item.subtitle;
            body.appendChild(sub);
        }
        if (item.id) {
            const idLine = document.createElement("div");
            idLine.className = "item-id";
            idLine.textContent = "ID: " + item.id;
            body.appendChild(idLine);
        }
        row.appendChild(body);

        return row;
    }

    (async function render() {
        try {
            document.getElementById("typeBadge").textContent = configData.typeName || "搜索结果";
            document.getElementById("resultTitle").textContent =
                "找到 " + (configData.total || 0) + " 条结果";
            if (configData.keyword) {
                document.getElementById("keywordLine").textContent = "关键词：" + configData.keyword;
            }
            const list = document.getElementById("itemList");
            const items = configData.items || [];
            for (let i = 0; i < items.length; i++) {
                list.appendChild(await renderItem(items[i], i));
            }
        } finally {
            window.__mcModReady = true;
        }
    })();
</script>
</body>
</html>
