<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCMod 百科卡片</title>
    <style>
        :root {
            --primary: #43a047;
            --primary-dark: #2e7d32;
            --primary-light: #81c784;
            --bg: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
            --card-bg: #ffffff;
            --text: #2e4a2f;
            --text-muted: #6b8f6e;
            --radius: 18px;
            --shadow: 0 12px 32px rgba(67, 160, 71, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; justify-content: center; padding: 12px; }

        .card {
            width: 96%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        .header {
            display: flex;
            gap: 18px;
            padding: 24px 24px 16px;
            align-items: flex-start;
        }

        .cover-wrap {
            width: 96px;
            height: 96px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            background: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(67, 160, 71, 0.2);
        }

        .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-fallback {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .meta { flex: 1; min-width: 0; }

        .badge {
            display: inline-block;
            background: rgba(67, 160, 71, 0.12);
            color: var(--primary-dark);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--primary-dark);
            word-break: break-word;
        }

        .body {
            padding: 0 24px 20px;
        }

        .summary {
            background: rgba(67, 160, 71, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text);
            margin-bottom: 14px;
            word-break: break-word;
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .info-label {
            color: var(--primary-dark);
            font-weight: 600;
            min-width: 42px;
        }

        .footer {
            border-top: 1px solid #e8f5e9;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .brand { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="cover-wrap" id="coverWrap">
            <div class="cover-fallback" id="coverFallback">MC</div>
        </div>
        <div class="meta">
            <div class="badge" id="typeBadge">MCMod</div>
            <div class="subtitle" id="subtitle"></div>
            <div class="title" id="title">加载中...</div>
        </div>
    </div>
    <div class="body">
        <div class="summary" id="summary" style="display:none;"></div>
        <div class="info-row"><span class="info-label">编号</span><span id="idValue">-</span></div>
        <div class="info-row"><span class="info-label">链接</span><span id="linkValue">-</span></div>
        <div class="info-row" id="timeRow" style="display:none;"><span class="info-label">时间</span><span id="timeValue"></span></div>
    </div>
    <div class="footer">
        <span class="brand">MCMod 百科</span>
        <span id="updateTime"></span>
    </div>
</div>

<script src="config.js"></script>
<script>
    window.__mcModReady = false;

    function preloadImage(url, timeoutMs) {
        timeoutMs = timeoutMs || 3000;
        return new Promise(resolve => {
            if (!url) return resolve(false);
            const img = new Image();
            let finished = false;
            const finish = ok => {
                if (finished) return;
                finished = true;
                clearTimeout(timer);
                resolve(ok);
            };
            const timer = setTimeout(() => finish(false), timeoutMs);
            img.onload = () => finish(true);
            img.onerror = () => finish(false);
            img.src = url;
        });
    }

    function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value || "";
    }

    function getAbbrev() {
        if (configData.shortName) return configData.shortName;
        if (configData.abbrev) return configData.abbrev;
        const match = (configData.title || "").match(/\[([^\]]+)]/);
        if (match) return match[1];
        const clean = (configData.title || "MC").replace(/^\[[^\]]+]\s*/, "").trim();
        return clean ? clean.substring(0, 2) : "MC";
    }

    function setUpdateTime() {
        const now = new Date();
        setText("updateTime", now.getFullYear() + "-" +
            String(now.getMonth() + 1).padStart(2, "0") + "-" +
            String(now.getDate()).padStart(2, "0") + " " +
            String(now.getHours()).padStart(2, "0") + ":" +
            String(now.getMinutes()).padStart(2, "0"));
    }

    function loadCoverAsync() {
        const cover = configData.cover;
        if (!cover) return;
        preloadImage(cover).then(ok => {
            if (ok) {
                document.getElementById("coverWrap").innerHTML =
                    '<img src="' + cover + '" alt="cover">';
            }
        });
    }

    (function render() {
        try {
            setText("typeBadge", configData.typeName || "MCMod");
            setText("title", configData.title);
            setText("idValue", configData.id || "-");
            setText("linkValue", configData.link || "-");

            if (configData.subtitle) {
                setText("subtitle", configData.subtitle);
            }

            if (configData.summary) {
                const summaryEl = document.getElementById("summary");
                summaryEl.style.display = "block";
                setText("summary", configData.summary);
            }

            if (configData.time) {
                document.getElementById("timeRow").style.display = "flex";
                setText("timeValue", configData.time);
            }

            document.getElementById("coverFallback").textContent = getAbbrev();
        } finally {
            setUpdateTime();
            window.__mcModReady = true;
        }
        loadCoverAsync();
    })();
</script>
</body>
</html>
