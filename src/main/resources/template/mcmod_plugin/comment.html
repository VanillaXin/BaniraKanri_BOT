<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCMod 评论提醒</title>
    <style>
        :root {
            --primary: #43a047;
            --primary-dark: #2e7d32;
            --reply: #00897b;
            --bg: linear-gradient(135deg, #f1f8e9 0%, #e8f5e9 100%);
            --card-bg: #ffffff;
            --text: #2e4a2f;
            --text-muted: #6b8f6e;
            --radius: 18px;
            --shadow: 0 12px 32px rgba(67, 160, 71, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body { display: flex; justify-content: center; padding: 12px; }

        .card {
            width: 96%;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card::before {
            content: "";
            display: block;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), #81c784);
        }

        .header {
            padding: 18px 22px 12px;
            border-bottom: 1px solid #e8f5e9;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        .badge-comment { background: var(--primary); }
        .badge-reply { background: var(--reply); }

        .target {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            line-height: 1.35;
            word-break: break-word;
        }

        .meta {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .parent {
            margin: 14px 22px 0;
            padding: 12px 14px;
            border-left: 3px solid var(--reply);
            background: rgba(0, 137, 123, 0.06);
            border-radius: 0 10px 10px 0;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .parent strong { color: var(--reply); }

        .content {
            margin: 16px 22px;
            padding: 16px;
            background: rgba(67, 160, 71, 0.07);
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .footer {
            padding: 10px 22px 16px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="badge badge-comment" id="typeBadge">新评论</div>
        <div class="target" id="targetLine">-</div>
        <div class="meta" id="metaLine"></div>
    </div>
    <div class="parent" id="parentBox" style="display:none;"></div>
    <div class="content" id="contentBox"></div>
    <div class="footer" id="banira-footer"></div>
</div>

<script src="footer.js"></script>
<script src="config.js"></script>
<script>
    window.__mcModReady = false;

    (function render() {
        const isReply = !!configData.reply;
        const badge = document.getElementById("typeBadge");
        badge.textContent = isReply ? "新回复" : "新评论";
        badge.className = "badge " + (isReply ? "badge-reply" : "badge-comment");

        document.getElementById("targetLine").textContent =
            (configData.commentType || "") + " · " + (configData.containerName || configData.containerId || "-");

        const metaParts = [];
        if (configData.userName) metaParts.push(configData.userName);
        if (configData.floor) metaParts.push("#" + configData.floor);
        if (configData.time) metaParts.push(configData.time);
        if (configData.commentId) metaParts.push("#" + configData.commentId);
        document.getElementById("metaLine").textContent = metaParts.join(" · ");

        if (isReply && configData.parentUser) {
            const parentBox = document.getElementById("parentBox");
            parentBox.style.display = "block";
            parentBox.innerHTML = "回复 <strong>@" + configData.parentUser + "</strong>：" +
                (configData.parentSummary || "");
        }

        document.getElementById("contentBox").textContent = configData.content || "";
        setBaniraFooter("banira-footer", "MCMod 评论监控");
        window.__mcModReady = true;
    })();
</script>
</body>
</html>
