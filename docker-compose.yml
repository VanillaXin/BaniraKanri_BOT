services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      TZ: Asia/Shanghai
      SEARXNG_BASE_URL: http://localhost:8081/
      SEARXNG_INSTANCE_NAME: BaniraKanri Search
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - appnet

  banira-kanri:
    build: .
    image: banira-kanri:latest
    container_name: banira-kanri
    restart: unless-stopped
    # Chromium 无头模式建议共享 IPC，降低 OOM 概率
    ipc: host
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./playwright:/app/.cache
    environment:
      TZ: Asia/Shanghai
      BANIRA_SEARCH_SEARXNG_URLS: http://searxng:8080/
    depends_on:
      - searxng
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
