<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花言草语 · PlantCode</title>
  <style>
  /* region 主题变量 */
    :root,
    [data-theme="day"] {
      --bg-deep: #fff5f8;
      --bg-card: rgba(255, 255, 255, 0.88);
      --bg-card-hover: rgba(255, 255, 255, 0.96);
      --border: rgba(244, 143, 177, 0.28);
      --text: #4a3340;
      --text-muted: #9a7a86;
      --accent: #f48fb1;
      --accent-dim: #ec407a;
      --accent-glow: rgba(244, 143, 177, 0.38);
      --danger: #d81b60;
      --panel-readonly: rgba(255, 245, 249, 0.72);
      --loading-bg: rgba(255, 245, 248, 0.94);
      --radius: 16px;
      --font-sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    [data-theme="night"] {
      --bg-deep: #1a1218;
      --bg-card: rgba(255, 255, 255, 0.06);
      --bg-card-hover: rgba(255, 255, 255, 0.1);
      --border: rgba(244, 143, 177, 0.22);
      --text: #fce4ec;
      --text-muted: #c9a8b5;
      --accent: #f8bbd0;
      --accent-dim: #f48fb1;
      --accent-glow: rgba(244, 143, 177, 0.28);
      --danger: #ff80ab;
      --panel-readonly: rgba(40, 24, 32, 0.55);
      --loading-bg: rgba(26, 18, 24, 0.94);
    }
  /* endregion 主题变量 */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg-deep);
      background-image:
        radial-gradient(ellipse 90% 55% at 12% -8%, rgba(255, 182, 193, 0.45), transparent),
        radial-gradient(ellipse 70% 45% at 100% 0%, rgba(255, 228, 240, 0.55), transparent),
        radial-gradient(ellipse 55% 40% at 50% 110%, rgba(244, 143, 177, 0.2), transparent);
      line-height: 1.6;
      transition: background 0.35s, color 0.35s;
    }

    [data-theme="night"] body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -15%, rgba(236, 64, 122, 0.18), transparent),
        radial-gradient(ellipse 55% 40% at 100% 100%, rgba(136, 14, 79, 0.22), transparent),
        radial-gradient(ellipse 45% 30% at 0% 85%, rgba(194, 24, 91, 0.12), transparent);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 0;
      right: 0;
      min-width: 2.75rem;
      padding: 0.45rem 0.75rem;
    }

    header .badge {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 0.75rem;
      background: rgba(125, 216, 125, 0.08);
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f8bbd0, var(--accent-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.5rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.55rem 1.1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    button:hover:not(:disabled) {
      background: var(--bg-card-hover);
      border-color: rgba(244, 143, 177, 0.45);
    }

    button:active:not(:disabled) { transform: scale(0.98); }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.primary {
      background: linear-gradient(135deg, var(--accent-dim), #f06292);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    button.primary:hover:not(:disabled) {
      box-shadow: 0 6px 28px var(--accent-glow);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 860px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 360px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .panel-head strong {
      color: var(--accent);
      font-weight: 600;
    }

    .panel-head .stat {
      font-variant-numeric: tabular-nums;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 220px;
      padding: 1rem 1.1rem;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
    }

    #mainIn,
    #mainOut {
      min-height: 280px;
      font-size: 1rem;
      line-height: 1.75;
      letter-spacing: 0.02em;
      word-break: break-word;
    }

    #mainOut {
      background: var(--panel-readonly);
    }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      text-align: center;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status.info {
      background: rgba(244, 143, 177, 0.1);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .status.ok {
      background: rgba(244, 143, 177, 0.16);
      color: var(--accent-dim);
      border: 1px solid rgba(244, 143, 177, 0.32);
    }

    .status.err {
      background: rgba(244, 143, 177, 0.12);
      color: var(--danger);
      border: 1px solid rgba(244, 143, 177, 0.25);
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.75;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--loading-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
      transition: opacity 0.4s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

    // region Java Random（与 java.util.Random 种子打乱一致）
    class JavaRandom {
      constructor(seed) {
        this.seed = (BigInt.asIntN(64, BigInt(seed)) ^ 0x5DEECE66Dn) & ((1n << 48n) - 1n);
      }

      next(bits) {
        this.seed = (this.seed * 0x5DEECE66Dn + 0xBn) & ((1n << 48n) - 1n);
        return Number(this.seed >> BigInt(48 - bits));
      }

      nextInt(bound) {
        if (bound <= 0) throw new Error('bound must be positive');
        if ((bound & (bound - 1)) === 0) {
          // 与 java.util.Random 一致：用 long 乘法，避免 JS 按位右移的 ToInt32 溢出
          const bits = this.next(31);
          return Number((BigInt(bound) * BigInt(bits)) >> 31n);
        }
        let bits;
        let val;
        do {
          bits = this.next(31);
          val = bits % bound;
        } while (bits - val + (bound - 1) < 0);
        return val;
      }
    }
    // endregion Java Random

    // region 植物表与定位符
    function javaSeedFromDigest(digest) {
      const view = new DataView(digest.buffer, digest.byteOffset, digest.byteLength);
      return view.getBigInt64(0, false);
    }

    async function shuffledPlantsForSalt(salt) {
      const digest = new Uint8Array(
        await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt))
      );
      const seed = javaSeedFromDigest(digest);
      const copy = BASE_PLANTS.slice();
      const rnd = new JavaRandom(seed);
      for (let i = copy.length - 1; i > 0; i--) {
        const j = rnd.nextInt(i + 1);
        const tmp = copy[i];
        copy[i] = copy[j];
        copy[j] = tmp;
      }
      return copy;
    }

    function getAroundLocator(tokenString) {
      if (!tokenString) return null;
      return LOCATOR.find(
        (kv) => tokenString.startsWith(kv.key) && tokenString.endsWith(kv.value)
      ) || null;
    }

    function replaceAroundLocator(tokenString) {
      const locator = getAroundLocator(tokenString);
      if (!locator) return tokenString;
      const reKey = new RegExp('^' + escapeRegExp(locator.key));
      const reVal = new RegExp(escapeRegExp(locator.value) + '$');
      return tokenString.replace(reKey, '').replace(reVal, '');
    }

    function escapeRegExp(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function gzipCompress(data) {
      if (!data || data.length === 0) return new Uint8Array(0);
      return pako.gzip(data);

    function gzipDecompress(compressedData) {
      if (!compressedData || compressedData.length === 0) return new Uint8Array(0);
      return pako.ungzip(compressedData);
    }

    function bytesToBaseNIndices(input, base) {
      if (base < 2) throw new Error('base must be >= 2');

        digits.push(0);
      } else {
        let current = src;
        while (current.length > 0) {
          const next = [];
          let carry = 0;
          for (let i = 0; i < current.length; i++) {
            const val = (carry << 8) | current[i];
            const q = Math.floor(val / base);
            carry = val % base;
            if (next.length > 0 || q !== 0) next.push(q);
          }
          digits.push(carry);
          current = new Uint8Array(next);
        }
        digits.reverse();
      }

      const total = leadingZeros + digits.length;
      const out = new Array(total);
      for (let i = 0; i < leadingZeros; i++) out[i] = 0;
      for (let i = 0; i < digits.length; i++) out[leadingZeros + i] = digits[i];
      return out;
    }

    function baseNIndicesToBytes(indices, base) {
      if (base < 2) throw new Error('base must be >= 2');
      if (indices.length === 0) return new Uint8Array(0);

      let leadingZeroIndices = 0;
      while (leadingZeroIndices < indices.length && indices[leadingZeroIndices] === 0) {
        leadingZeroIndices++;
      }

      const src = indices.slice(leadingZeroIndices);
      const outBytes = [];

      if (src.length > 0) {
        let cur = src.slice();
        while (cur.length > 0) {
          let carry = 0;
          const next = [];
          for (const d of cur) {
            if (d < 0 || d >= base) throw new Error('digit out of range');
            const acc = carry * base + d;
            const q = Math.floor(acc / 256);
            const r = acc % 256;
            if (next.length > 0 || q !== 0) next.push(q);
            carry = r;
          }
          outBytes.push(carry);
          cur = next;
        }
        outBytes.reverse();
      }

      const result = new Uint8Array(leadingZeroIndices + outBytes.length);
      for (let i = 0; i < outBytes.length; i++) result[leadingZeroIndices + i] = outBytes[i];
      return result;
    }
    // endregion Base-N 转换

    // region 加解密
    async function deriveKeyFromSalt(salt) {
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt));
      return crypto.subtle.importKey('raw', digest, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
    }

    async function encode(string) {
      if (string == null) string = '';

      const plainBytes = new TextEncoder().encode(string);
      const compressed = gzipCompress(plainBytes);
      let payload;
      if (compressed.length < plainBytes.length) {
        payload = new Uint8Array(1 + compressed.length);
        payload[0] = 1;
        payload.set(compressed, 1);
      } else {
        payload = new Uint8Array(1 + plainBytes.length);
        payload[0] = 0;
        payload.set(plainBytes, 1);
      }

      const key = await deriveKeyFromSalt(SALT);
      const iv = crypto.getRandomValues(new Uint8Array(GCM_IV_BYTES));
      const cipherBytes = new Uint8Array(
        await crypto.subtle.encrypt({ name: 'AES-GCM', iv, tagLength: GCM_TAG_BITS }, key, payload)
      );

      const out = new Uint8Array(iv.length + cipherBytes.length);
      out.set(iv);
      out.set(cipherBytes, iv.length);

      const base = RESORT_PLANTS.length;
      const digits = bytesToBaseNIndices(out, base);
      return digits.map((d) => RESORT_PLANTS[d]).join('');
    }

    async function decode(tokenString) {
      tokenString = replaceAroundLocator(tokenString);
      if (tokenString == null) tokenString = '';

      const base = RESORT_PLANTS.length;
      if (tokenString.length % TOKEN_CHAR_LENGTH !== 0) {
        throw new Error('密文长度无效');
      }

      const tokenCount = tokenString.length / TOKEN_CHAR_LENGTH;
      const indices = new Array(tokenCount);
      for (let i = 0; i < tokenCount; i++) {
        const token = tokenString.substring(i * TOKEN_CHAR_LENGTH, (i + 1) * TOKEN_CHAR_LENGTH);
        const idx = tokenToIndex.get(token);
        if (idx === undefined) throw new Error('无效植物字符: ' + token);
        indices[i] = idx;
      }

      const combined = baseNIndicesToBytes(indices, base);
      if (combined.length < GCM_IV_BYTES + 1) throw new Error('解码字节过短');

      const iv = combined.subarray(0, GCM_IV_BYTES);
      const ct = combined.subarray(GCM_IV_BYTES);
      const key = await deriveKeyFromSalt(SALT);

      let payload;
      try {
        payload = new Uint8Array(
          await crypto.subtle.decrypt({ name: 'AES-GCM', iv, tagLength: GCM_TAG_BITS }, key, ct)
        );
      } catch {
        return null;
      }

      if (payload.length < 1) throw new Error('解密载荷过短');
      const compressed = payload[0] === 1;
      const data = payload.subarray(1);
      const plainBytes = compressed ? await gzipDecompress(data) : data;
      return new TextDecoder().decode(plainBytes);
    }

    function isPlantToken(tokenString) {
      if (!tokenString) return false;
      const string = replaceAroundLocator(tokenString);
      if (string.length % TOKEN_CHAR_LENGTH !== 0) return false;
      for (let i = 0; i < string.length; i += TOKEN_CHAR_LENGTH) {
        const token = string.substring(i, i + TOKEN_CHAR_LENGTH);
        if (!PLANT_SET.has(token)) return false;
      }
      return true;
    }
    // endregion 加解密

    // region 智能识别与混合文本
    const MIN_PLANT_CIPHER_CHARS = 24;

    function isPlantChar(ch) {
      return PLANT_SET.has(ch);
    }

    function splitSegments(text) {
      const chars = [...text];
      const segments = [];
      let i = 0;
      while (i < chars.length) {
        if (isPlantChar(chars[i])) {
          let j = i;
          while (j < chars.length && isPlantChar(chars[j])) j++;
          segments.push({ type: 'plant', text: chars.slice(i, j).join('') });
          i = j;
        } else {
          let j = i;
          while (j < chars.length && !isPlantChar(chars[j])) j++;
          segments.push({ type: 'plain', text: chars.slice(i, j).join('') });
          i = j;
        }
      }
      return segments;
    }

    function isLikelyPlantCipher(text) {
      if (!text) return false;
      if (getAroundLocator(text)) return true;
      const segments = splitSegments(text);
      if (segments.some((s) => s.type === 'plain' && s.text.length > 0)) return false;
      const plantLen = segments.filter((s) => s.type === 'plant').reduce((n, s) => n + s.text.length, 0);
      return plantLen >= MIN_PLANT_CIPHER_CHARS;
    }

    function isLikelyPlainText(text) {
      if (!text) return false;
      if (isLikelyPlantCipher(text)) return false;
      const segments = splitSegments(text);
      if (segments.length === 1 && segments[0].type === 'plant') return false;
      if (segments.some((s) => s.type === 'plant')) return false;
      return true;
    }

    async function tryDecodeSegment(segment) {
      if (segment.length < MIN_PLANT_CIPHER_CHARS) return null;
      try {
        return await decode(segment);
      } catch {
        return null;
      }
    }


    async function decodeMixedText(text) {
      const trimmed = text.trim();
      if (!trimmed) return { text: '', mode: 'empty' };
      if (getAroundLocator(trimmed)) {
        const inner = replaceAroundLocator(trimmed);
        const decoded = await tryDecodeSegment(inner);
        if (decoded !== null) return { text: decoded, mode: 'decoded' };
        return { text: trimmed, mode: 'cipher-fail' };
      }
      const segments = splitSegments(trimmed);
      if (!segments.some((s) => s.type === 'plant')) {
        const decoded = await tryDecodeSegment(trimmed);
        if (decoded !== null) return { text: decoded, mode: 'decoded' };
        return { text: trimmed, mode: 'cipher-fail' };
      }
      const parts = [];
      for (const seg of segments) {
        if (seg.type !== 'plant') {
          parts.push(seg.text);
          continue;
        }
        const decoded = await tryDecodeSegment(seg.text);
        parts.push(decoded !== null ? decoded : seg.text);
      }
      return { text: parts.join(''), mode: 'mixed-decoded' };
    }

    async function processSmartText(text) {
      if (!text) return { text: '', mode: 'empty' };

      const trimmed = text.trim();
      if (!trimmed) return { text: '', mode: 'empty' };

      const segments = splitSegments(trimmed);
      const hasPlant = segments.some((s) => s.type === 'plant');
      const hasPlain = segments.some((s) => s.type === 'plain' && s.text.length > 0);

      if (hasPlant && hasPlain) {
        return decodeMixedText(trimmed);
      }

      if (getAroundLocator(trimmed)) {
        const inner = replaceAroundLocator(trimmed);
        const decoded = await tryDecodeSegment(inner);
        if (decoded !== null) return { text: decoded, mode: 'decoded' };
        return { text: trimmed, mode: 'cipher-fail' };
      }

      if (isLikelyPlantCipher(trimmed)) {
        const decoded = await tryDecodeSegment(trimmed);
        if (decoded !== null) return { text: decoded, mode: 'decoded' };
        return { text: trimmed, mode: 'cipher-fail' };
      }

      if (isLikelyPlainText(trimmed)) {
        const encoded = await encode(trimmed);
        return { text: encoded, mode: 'encoded' };
      }

      return { text: trimmed, mode: 'plain' };
    }

    // region UI
    const $ = (id) => document.getElementById(id);
    const mainIn = $('mainIn');
    const mainOut = $('mainOut');
    const statusEl = $('status');
    const loadingEl = $('loading');
    const btnTheme = $('btnTheme');
    const THEME_KEY = 'plantcode-theme';
    let processTimer = null;

    function setStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    function applyTheme(theme) {
      const next = theme === 'night' ? 'night' : 'day';
      document.body.dataset.theme = next;
      btnTheme.textContent = next === 'night' ? '☀️' : '🌙';
      btnTheme.title = next === 'night' ? '切换到日间模式' : '切换到夜间模式';
      try {
        localStorage.setItem(THEME_KEY, next);
      } catch {
        /* 忽略存储失败 */
      }
    }

    function initTheme() {
      let saved = 'day';
      try {
        saved = localStorage.getItem(THEME_KEY) || 'day';
      } catch {
        /* 忽略 */
      }
      applyTheme(saved);
      btnTheme.addEventListener('click', () => {
        const current = document.body.dataset.theme === 'night' ? 'night' : 'day';
        applyTheme(current === 'night' ? 'day' : 'night');
      });
    }

    function updateStats() {
      $('inStat').textContent = mainIn.value.length + ' 字';
      $('outStat').textContent = mainOut.value.length + ' 字';
    }

    function setOutput(text) {
      mainOut.value = text;
      $('outStat').textContent = text.length + ' 字';
    }

    function enableControls(enabled) {
      ['btnProcess', 'btnEncode', 'btnDecode', 'btnClear', 'btnCopy'].forEach((id) => {
        $(id).disabled = !enabled;
      });
    }

    async function runProcess() {
      if (!RESORT_PLANTS) return;
      const text = mainIn.value;
      if (!text) {
        setOutput('');
        setStatus('请输入内容', 'info');
        return;
      }
      try {
        const result = await processSmartText(text);
        setOutput(result.text);
        const modeText = {
          empty: '已清空',
          plain: '内容未自动转换',
          encoded: '已识别为明文并完成编码',
          'mixed-decoded': '已解码混合文本中的植物段',
          'mixed-encoded': '已编码混合文本中的非植物段',
          'cipher-fail': '未能识别为有效密文',
          decoded: '已解码',
        };
        const st = result.mode === 'cipher-fail' ? 'err' : (result.mode.startsWith('mixed') || result.mode === 'decoded' || result.mode === 'encoded' ? 'ok' : 'info');
        setStatus(modeText[result.mode] || result.mode, st);
      } catch (e) {
        setStatus('处理失败: ' + e.message, 'err');
      }
    }

    function scheduleProcess() {
      clearTimeout(processTimer);
      processTimer = setTimeout(() => runProcess(), 400);
    }

    $('btnProcess').addEventListener('click', runProcess);
    $('btnEncode').addEventListener('click', async () => {
      const text = mainIn.value;
      if (!text) {
        setStatus('请输入内容', 'err');
        return;
      }
      try {
        setStatus('编码中…', 'info');
        const encoded = await encode(text);
        setOutput(encoded);
        setStatus('编码完成', 'ok');
      } catch (e) {
        setStatus('编码失败: ' + e.message, 'err');
      }
    });

    $('btnDecode').addEventListener('click', async () => {
      const text = mainIn.value;
      if (!text) {
        setStatus('请输入内容', 'err');
        return;
      }
      try {
        setStatus('解码中…', 'info');
        const result = await decodeMixedText(text);
        setOutput(result.text);
        const modeText = {
          empty: '已清空',
          plain: '内容未改动',
          encoded: '已识别为密文并还原',
          decoded: '已还原为明文',
          'mixed-decoded': '已解码混合文本',
          'mixed-encoded': '已编码混合文本',
          'cipher-fail': '未能识别密文',
        };
        const st = result.mode === 'cipher-fail' ? 'err' : (result.mode === 'decoded' || result.mode === 'mixed-decoded' ? 'ok' : 'info');
        setStatus(modeText[result.mode] || result.mode, st);
      } catch (e) {
        setStatus('处理失败: ' + e.message, 'err');
      }
    });

    $('btnClear').addEventListener('click', () => {
      mainIn.value = '';
      setOutput('');
      updateStats();
      setStatus('已清空', 'info');
    });

    $('btnCopy').addEventListener('click', async () => {
      const text = mainOut.value;
      if (!text) {
        setStatus('没有可复制的结果', 'err');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus('已复制结果到剪贴板', 'ok');
      } catch {
        setStatus('复制失败，请手动选择文本', 'err');
      }
    });

    mainIn.addEventListener('input', updateStats);
    mainIn.addEventListener('paste', (e) => {
      const pasted = (e.clipboardData || window.clipboardData).getData('text/plain');
      if (!pasted) return;
      e.preventDefault();
      const start = mainIn.selectionStart;
      const end = mainIn.selectionEnd;
      mainIn.value = mainIn.value.slice(0, start) + pasted + mainIn.value.slice(end);
      mainIn.selectionStart = mainIn.selectionEnd = start + pasted.length;
      updateStats();
      scheduleProcess();
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        runProcess();
      }
    });

    initTheme();

    async function init() {
      if (!window.crypto?.subtle) {
        setStatus('当前浏览器不支持 Web Crypto，请改用 Chrome、Edge 或 Firefox。', 'err');
        loadingEl.classList.add('hidden');
        return;
      }
      try {
        RESORT_PLANTS = await shuffledPlantsForSalt(SALT);
        tokenToIndex = new Map(RESORT_PLANTS.map((t, i) => [t, i]));
        window.plantCipher = { encode, decode, decodeMixedText, processSmartText };
        enableControls(true);
        setStatus('就绪 · 完全离线 · 植物表 ' + RESORT_PLANTS.length + ' 字 · 粘贴后自动识别 · Ctrl+Enter 立即转换', 'ok');
      } catch (e) {
        setStatus('初始化失败: ' + e.message, 'err');
      } finally {
        loadingEl.classList.add('hidden');
      }
    }

    init();
    // endregion UI
  </script>
</body>
</html>
